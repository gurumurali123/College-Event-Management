<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  </head>
  <body>
    
    <div class="d-flex flex-row justify-content-center formdiv">
        <div class="form-section">
            <h3 class="text-center text-white"> Register For Event </h3>

             <div class="mb-3 text-white">
             <label for="fullName" class="form-label">Full Name</label>
             <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
            </div>

            <div class="mb-3 text-white">
             <label for="email" class="form-label">Email address</label>
             <input type="email" class="form-control" id="email" placeholder="Enter your email">
            </div>

            <div class="mb-4 text-white">
             <label for="phone" class="form-label">Phone Number</label>
             <input type="text" class="form-control" id="phone" placeholder="Enter your phone number">
            </div>

             <h5 class="text-white">Team Members</h5>
            <select class="form-select mb-3" aria-label="Default select example" id="TeamMembers">
              <option selected>select members</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            </select>
 <h5 class="text-white">Event</h5>
             <select class="form-select mb-3" aria-label="Default select example" id="EventList">
              <option selected>select Event</option>
            <option value="1">Hackathon 2K26</option>
            <option value="2">AI Workshop</option>
            <option value="3">Cultural Fest</option>
            
            </select>

              <div class="mb-4 text-white">
             <label for="college" class="form-label">college</label>
             <input type="text" class="form-control" id="college" placeholder="college Name">
            </div>

           <h5 class="text-white">Year</h5>
             <select class="form-select mt-3 mb-4" id="YearSelect">
              <option selected>Year</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            </select>

            <button class="btn btn-primary pr-3" onclick="validateForm()"> Register</button>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>
  </body>
</html>
